services:
  - type: web
    name: cntrlm-crm-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run init-db
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: TWILIO_ACCOUNT_SID
        value: YOUR_TWILIO_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        sync: false
        value: YOUR_TWILIO_AUTH_TOKEN
      - key: TWILIO_PHONE_NUMBER
        value: +12602394730

  - type: web
    name: cntrlm-crm-dashboard
    env: node
    region: oregon
    plan: free
    buildCommand: cd dashboard && npm install && npm run build
    startCommand: cd dashboard && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://cntrlm-crm-backend.onrender.com
